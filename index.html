<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>かふぇ絲 ARフロア</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* 日本語ダイアログの見た目を整える */
        #ar-prompt {
            position: fixed; z-index: 9999; background: white;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; border-radius: 10px; width: 80%; max-width: 300px;
            text-align: center; font-family: sans-serif; box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        #ar-prompt button {
            margin: 10px; padding: 10px 20px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer;
        }
        #allow-btn { background: #50C8F8; color: white; }
        #deny-btn { background: #F34F7B; color: white; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-prompt">
        <p>このAR体験にはデバイスの動きセンサーへのアクセスが必要です。</p>
        <button id="deny-btn">拒否する</button>
        <button id="allow-btn">許可する</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        device-orientation-permission-ui="enabled: false">
        
        <a-marker type="pattern" url="pattern-marker.patt">
            <a-entity 
                gltf-model="url(tora-v1.glb)" 
                position="0 0 0" 
                scale="1 1 1"
                rotation="-90 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const prompt = document.querySelector('#ar-prompt');
        const allowBtn = document.querySelector('#allow-btn');
        const denyBtn = document.querySelector('#deny-btn');

        // 許可ボタンが押された時の処理
        allowBtn.addEventListener('click', function() {
            // iOS等のブラウザにモーションセンサーの許可をリクエスト
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            prompt.style.display = 'none';
                        } else {
                            alert('センサーへのアクセスが拒否されました。');
                        }
                    })
                    .catch(console.error);
            } else {
                // iOS13以前やAndroidなどはそのまま非表示
                prompt.style.display = 'none';
            }
        });

        // 拒否ボタン
        denyBtn.addEventListener('click', function() {
            prompt.innerHTML = '<p>体験を続けるにはページを再読み込みしてください。</p>';
        });
    </script>
</body>
</html>
