<body>
    <div id="start-button" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 20px; background: white; border-radius: 10px; font-weight: bold;">
        ARを開始する
    </div>

    <niantic-vps-scene location-id="baabee12-b43b-47c9-8e7f-70c57702746f">
        <niantic-model src="tora-v1.glb" scale="1 1 1" position="0 0 0"></niantic-model>
    </niantic-vps-scene>

    <script>
        // ボタンを押した瞬間にARを起動させる
        document.getElementById('start-button').addEventListener('click', () => {
            document.getElementById('start-button').style.display = 'none';
            // Nianticのエンジンに開始を合図（必要に応じて自動で走りますがタップが重要）
        });
    </script>
</body>
