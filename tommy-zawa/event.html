<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かふぇ絲 AR体験</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* ARの読み込み中UIなどは非表示 */
        .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

        #ui-layer {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .guide-text {
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            font-size: 14px;
            font-family: sans-serif;
        }

        #shot-mode-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 撮影用クラス：これを付けるとUIが消える */
        .hide-ui {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="guide-text">ボタンを押して、標準スクショで撮影！</div>
        <button id="shot-mode-btn">📸 撮影モード (UIを隠す)</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./tommy.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="tora-model" src="torakun-sing.glb"></a-asset-item>
            <a-asset-item id="king-model" src="king-v1.glb"></a-asset-item>
            <a-asset-item id="kapper-model" src="kepper-v1.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#tora-model" position="0 -0.1 0.1" scale="4 4 4" rotation="180 90 90" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#king-model" position="0 -0.1 0.1" scale="2 2 2" rotation="180 90 90" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
        </a-entity>
        
        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model src="#kapper-model" position="0 -0.1 0.1" scale="2 2 2" rotation="180 90 90" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const uiLayer = document.getElementById('ui-layer');
        const btn = document.getElementById('shot-mode-btn');

        btn.addEventListener('click', () => {
            // UIを隠す
            uiLayer.classList.add('hide-ui');

            // 5秒後にUIを再表示する
            setTimeout(() => {
                uiLayer.classList.remove('hide-ui');
            }, 5000);
        });
    </script>
</body>
</html>
